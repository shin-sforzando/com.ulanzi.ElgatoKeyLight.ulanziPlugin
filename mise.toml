# mise configuration: pins the Node toolchain and automates first-time setup.
#
# Node runtime note: in production the plugin's main service is executed by the
# Node runtime embedded in Ulanzi Studio (v20). This pin only governs LOCAL dev
# tooling (degit / npm / standalone `node plugin/app.js` / the simulator). The
# plugin code is ESM + global fetch + pure-JS deps (no native ABI), so the exact
# local version is not critical; we use the current LTS for a modern toolchain.
[tools]
node = "24.18.0"
# Formatting/linting (Biome) and git hooks (lefthook) are managed as mise tools
# rather than npm devDependencies, so node_modules — and therefore the deployed
# plugin — stays limited to runtime deps (ws, bonjour-service).
biome = "2.5.1"
lefthook = "2.1.9"
# Markdown linting (Biome does not cover Markdown). npm backend keeps it off the
# project's runtime node_modules, consistent with the lean-deploy approach above.
"npm:markdownlint-cli2" = "0.22.1"
# Changelog generation from Conventional Commits (used by `mise run changelog`).
"git-cliff" = "2.13.1"

[env]
# The Ulanzi SDK component repos have no tags/releases, so they are pinned by
# commit SHA. To update: bump a SHA, run `mise run sync-sdk`, review `git diff`,
# then commit. Reproducibility ultimately comes from committing the fetched
# files (vendoring), not from degit's ref resolution.
SDK_HTML_REF = "0152f0d9399bff779768628c7a6e346e1fc15ed7"
SDK_NODE_REF = "112bd13a7ff9d45bd68656f7e069fd61851d1812"

# Fetch the vendored SDK into libs/ (Property Inspector) and plugin-common-node/
# (Node main service). These directories ARE committed to the repo.
#
# degit may fail to resolve a bare commit SHA. If so, fall back to `#main`
# (newest) or add `--mode=git` (real clone + checkout, any SHA). Either way the
# pin is preserved by committing the result.
[tasks.sync-sdk]
description = "Fetch vendored Ulanzi SDK (libs/ + plugin-common-node/) at pinned SHAs"
run = [
  "npx -y degit@3 UlanziTechnology/plugin-common-html#${SDK_HTML_REF} libs --force",
  "npx -y degit@3 UlanziTechnology/plugin-common-node#${SDK_NODE_REF} plugin-common-node --force",
]

# First-time setup: fetch the SDK, install npm dependencies (ws, mDNS), and
# install the git hooks (Biome format/lint on commit).
[tasks.setup]
description = "First-time setup: fetch SDK + install deps + git hooks"
depends = ["sync-sdk"]
run = [
  "npm install",
  "lefthook install",
]

# Format and autofix the whole repo: Biome (JS/HTML/JSON/JSONC) + markdownlint.
[tasks.fmt]
description = "Format & autofix: Biome (JS/HTML/JSON) + markdownlint"
run = [
  "biome check --write .",
  'markdownlint-cli2 --fix "**/*.md"',
]

# Check the whole repo without writing (for CI / manual verification).
[tasks.lint]
description = "Lint/check without writing: Biome + markdownlint"
run = [
  "biome check .",
  'markdownlint-cli2 "**/*.md"',
]

# Deploy this folder into the Ulanzi Studio Plugins directory (macOS) for
# on-device testing. Studio loads the folder as-is, so dev-only files are
# excluded and node_modules (runtime deps) are included. Restart Studio after.
[tasks.deploy]
description = "Copy the plugin into the Ulanzi Studio Plugins dir (macOS)"
run = """
rsync -a --delete \
  --exclude '.git' --exclude '.claude' --exclude '.vscode' --exclude '.gitignore' \
  --exclude 'mise.toml' --exclude '.DS_Store' --exclude '*.log' \
  ./ "$HOME/Library/Application Support/Ulanzi/UlanziDeck/Plugins/com.ulanzi.ElgatoKeyLight.ulanziPlugin/"
"""

# Build the distributable ZIP for marketplace submission. The archive's top-level
# entry is the `com.ulanzi.ElgatoKeyLight.ulanziPlugin/` folder, so reviewers can
# unzip it straight into Studio's Plugins directory. Runtime deps (ws,
# bonjour-service) are bundled via `npm install --omit=dev`; dev-only files and
# tooling configs are excluded. Staging in a temp dir keeps the zip root clean.
[tasks.package]
description = "Build dist/com.ulanzi.ElgatoKeyLight.ulanziPlugin.zip for submission"
run = """
set -euo pipefail
PLUGIN_DIR="com.ulanzi.ElgatoKeyLight.ulanziPlugin"
# Ensure only runtime dependencies are present before bundling node_modules.
npm install --omit=dev
rm -rf dist
mkdir -p dist
STAGE="$(mktemp -d)"
rsync -a \
  --exclude '.git' --exclude '.claude' --exclude '.vscode' --exclude '.gitignore' \
  --exclude '.github' --exclude 'dist' --exclude 'mise.toml' --exclude 'cliff.toml' \
  --exclude 'lefthook.yml' --exclude 'biome.json' --exclude '.markdownlint-cli2.jsonc' \
  --exclude 'CONTRIBUTING.md' \
  --exclude '.DS_Store' --exclude '*.log' \
  ./ "$STAGE/$PLUGIN_DIR/"
( cd "$STAGE" && zip -r -q "$PLUGIN_DIR.zip" "$PLUGIN_DIR" )
mv "$STAGE/$PLUGIN_DIR.zip" "dist/$PLUGIN_DIR.zip"
rm -rf "$STAGE"
echo "Built dist/$PLUGIN_DIR.zip"
"""

# Generate/refresh CHANGELOG.md from Conventional Commits via git-cliff. mise
# appends any extra args to the command, so pass git-cliff flags through, e.g.
# `mise run changelog -- --tag v1.0.0` to stamp the unreleased section as v1.0.0.
# cliff.toml uses [remote.github]; set GITHUB_TOKEN in the environment to enrich
# entries with contributor/PR data (optional).
[tasks.changelog]
description = "Generate CHANGELOG.md via git-cliff (e.g. -- --tag v1.0.0)"
run = "git cliff --output CHANGELOG.md"
