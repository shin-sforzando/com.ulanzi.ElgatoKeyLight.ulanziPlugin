# configuration file for git-cliff (0.1.0)

[changelog]
# changelog header
header = """
# CHANGELOG

Last updated: {{ now() | date(timezone="Asia/Tokyo", format="%Y-%m-%d") }}

All notable changes to this project will be documented in this file."""
# template for the changelog body
# https://tera.netlify.app/docs/#introduction
body = """

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(timezone="Asia/Tokyo", format="%Y-%m-%d") }}
{%- else -%}
## [unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.author.timestamp | date(timezone="Asia/Tokyo", format="%Y-%m-%d %H:%M:%S") }} {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}{% if commit.remote %} by _@{{ commit.remote.username }}_{% endif %}
{%- endfor %}
{% endfor -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length > 0 %}
## Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
- @{{ contributor.username }} made their first contribution in #{{ contributor.pr_number }}
{%- endfor %}
{% endif -%}
"""
# keep template whitespace as-is; the body manages its own blank lines so that
# consecutive release sections satisfy markdownlint (MD022/MD032).
trim = false
# changelog footer
footer = """
<!-- generated by git-cliff -->"""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# regex for parsing and grouping commits
commit_parsers = [
    { body = ".*security", group = "Security"},
    { message = "^chore", group = "Miscellaneous Tasks", skip = true},
    { message = "^chore\\(release\\): prepare for", skip = true},
    { message = "^docs", group = "Documentation", skip = true},
    { message = "^feat", group = "Features"},
    { message = "^fix", group = "Bug Fixes"},
    { message = "^perf", group = "Performance"},
    { message = "^refactor", group = "Refactor"},
    { message = "^release", group = "Releases"},
    { message = "^style", group = "Styling"},
    { message = "^test", group = "Testing"},
    { message = "^wip", skip = true},
]
# filter out the commits that are not matched by commit parsers
filter_commits = false
# glob pattern for matching git tags
tag_pattern = "v?[0-9]*"
# regex for skipping tags
skip_tags = "v0.1.0-beta.1"
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
# read and process commits of submodules
recurse_submodules = false

[remote]
offline = false

[remote.github]
owner = "shin-sforzando"
repo = "com.ulanzi.ElgatoKeyLight.ulanziPlugin"
